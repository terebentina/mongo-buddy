<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a2a"/>
      <stop offset="100%" stop-color="#0d2218"/>
    </linearGradient>
    <linearGradient id="leaf-grad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#00ed64"/>
      <stop offset="100%" stop-color="#00a844"/>
    </linearGradient>
    <linearGradient id="leaf-shadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00c952"/>
      <stop offset="100%" stop-color="#007a32"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="leaf-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#00ed64" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- App icon background -->
  <rect width="400" height="400" rx="88" fill="url(#bg-grad)"/>

  <!-- Subtle grid texture dots -->
  <g opacity="0.06" fill="#00ed64">
    <circle cx="60" cy="60" r="2"/><circle cx="120" cy="60" r="2"/><circle cx="180" cy="60" r="2"/><circle cx="240" cy="60" r="2"/><circle cx="300" cy="60" r="2"/><circle cx="360" cy="60" r="2"/>
    <circle cx="60" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="180" cy="120" r="2"/><circle cx="240" cy="120" r="2"/><circle cx="300" cy="120" r="2"/><circle cx="360" cy="120" r="2"/>
    <circle cx="60" cy="180" r="2"/><circle cx="120" cy="180" r="2"/><circle cx="180" cy="180" r="2"/><circle cx="240" cy="180" r="2"/><circle cx="300" cy="180" r="2"/><circle cx="360" cy="180" r="2"/>
    <circle cx="60" cy="240" r="2"/><circle cx="120" cy="240" r="2"/><circle cx="180" cy="240" r="2"/><circle cx="240" cy="240" r="2"/><circle cx="300" cy="240" r="2"/><circle cx="360" cy="240" r="2"/>
    <circle cx="60" cy="300" r="2"/><circle cx="120" cy="300" r="2"/><circle cx="180" cy="300" r="2"/><circle cx="240" cy="300" r="2"/><circle cx="300" cy="300" r="2"/><circle cx="360" cy="300" r="2"/>
    <circle cx="60" cy="360" r="2"/><circle cx="120" cy="360" r="2"/><circle cx="180" cy="360" r="2"/><circle cx="240" cy="360" r="2"/><circle cx="300" cy="360" r="2"/><circle cx="360" cy="360" r="2"/>
  </g>

  <!-- MongoDB leaf shape -->
  <g filter="url(#leaf-glow)">
    <path d="M200 60 C200 60 240 110 248 170 C256 230 240 275 200 310 C160 275 144 230 152 170 C160 110 200 60 200 60Z" fill="url(#leaf-grad)"/>
    <path d="M200 310 C200 310 240 275 248 170 C252 140 248 105 240 80 C258 120 264 200 248 270 C240 296 220 312 200 310Z" fill="url(#leaf-shadow)" opacity="0.7"/>
    <line x1="200" y1="85" x2="200" y2="310" stroke="#004d22" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Root drop -->
  <path d="M200 310 Q202 330 204 345" stroke="#00c952" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.8"/>

  <!-- Eyes -->
  <g filter="url(#soft-shadow)">
    <ellipse cx="178" cy="205" rx="11" ry="13" fill="#0d2218"/>
    <ellipse cx="178" cy="205" rx="8" ry="10" fill="#fff"/>
    <circle cx="180" cy="204" r="5" fill="#0d2218"/>
    <circle cx="182" cy="202" r="1.5" fill="#fff"/>
    <ellipse cx="222" cy="205" rx="11" ry="13" fill="#0d2218"/>
    <ellipse cx="222" cy="205" rx="8" ry="10" fill="#fff"/>
    <circle cx="224" cy="204" r="5" fill="#0d2218"/>
    <circle cx="226" cy="202" r="1.5" fill="#fff"/>
  </g>

  <!-- Smile -->
  <path d="M186 228 Q200 242 214 228" stroke="#0d2218" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- DB cylinder accent -->
  <g opacity="0.85" transform="translate(282,290)">
    <ellipse cx="30" cy="12" rx="24" ry="8" fill="#00a844"/>
    <rect x="6" y="12" width="48" height="30" fill="#007a32"/>
    <ellipse cx="30" cy="42" rx="24" ry="8" fill="#00a844"/>
    <ellipse cx="30" cy="12" rx="24" ry="8" fill="#00c952"/>
    <line x1="6" y1="22" x2="54" y2="22" stroke="#009940" stroke-width="1" opacity="0.6"/>
    <line x1="6" y1="32" x2="54" y2="32" stroke="#009940" stroke-width="1" opacity="0.6"/>
  </g>
</svg>
