appId: com.mongobuddy.app
productName: MongoBuddy
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
npmRebuild: false
win:
  icon: build/icon.png
  target:
    - target: nsis
      arch: x64
mac:
  icon: build/icon.png
  target:
    - target: dmg
      arch: arm64
linux:
  icon: build/icon.png
  target:
    - AppImage
    - deb
publish:
  provider: github
  owner: terebentina
  repo: mongo-buddy
